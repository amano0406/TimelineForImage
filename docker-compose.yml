name: timeline-for-image

services:
  worker:
    image: timeline-for-image-worker:latest
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      TIMELINE_FOR_IMAGE_IN_DOCKER: "1"
      TIMELINE_FOR_IMAGE_SETTINGS_PATH: ${TIMELINE_FOR_IMAGE_SETTINGS_PATH:-/workspace/settings.json}
      TIMELINE_FOR_IMAGE_SETTINGS_EXAMPLE_PATH: ${TIMELINE_FOR_IMAGE_SETTINGS_EXAMPLE_PATH:-/workspace/settings.example.json}
      TIMELINE_FOR_IMAGE_INTERNAL_STATE_ROOT: ${TIMELINE_FOR_IMAGE_INTERNAL_STATE_ROOT:-/shared/app-data/timeline-for-image-state}
      TIMELINE_FOR_IMAGE_WORKER_INTERVAL_SECONDS: ${TIMELINE_FOR_IMAGE_WORKER_INTERVAL_SECONDS:-60}
      PYTHONPATH: /workspace/worker/src
      TESSDATA_PREFIX: /usr/share/tesseract-ocr/5/tessdata
    volumes:
      - ./:/workspace
      - type: bind
        source: ${TIMELINE_FOR_IMAGE_C_DRIVE_MOUNT:-/mnt/c}
        target: /mnt/c
      - app-data:/shared/app-data
      - cache-data:/shared/cache

volumes:
  app-data:
  cache-data:
